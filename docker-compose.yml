version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: ayurtrace-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: ayurtrace
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - ayurtrace-network

  # Backend API Service
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: ayurtrace-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://admin:password@mongodb:27017/ayurtrace?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      JWT_EXPIRE: 7d
      CORS_ORIGIN: http://localhost:3000,http://frontend:3000
      LOG_LEVEL: info
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    depends_on:
      - mongodb
      - fabric-ca-org1
    networks:
      - ayurtrace-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ayurtrace-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:3001/api
      REACT_APP_ENVIRONMENT: production
    depends_on:
      - backend
    networks:
      - ayurtrace-network

  # Hyperledger Fabric Network Components
  
  # Certificate Authority for Org1
  fabric-ca-org1:
    image: hyperledger/fabric-ca:latest
    container_name: ayurtrace-ca-org1
    restart: unless-stopped
    ports:
      - "7054:7054"
    environment:
      FABRIC_CA_HOME: /etc/hyperledger/fabric-ca-server
      FABRIC_CA_SERVER_CA_NAME: ca-org1
      FABRIC_CA_SERVER_TLS_ENABLED: false
      FABRIC_CA_SERVER_PORT: 7054
    volumes:
      - ./blockchain/network/ca-org1:/etc/hyperledger/fabric-ca-server
    networks:
      - ayurtrace-network

  # Peer0 for Org1 (Farmers and Manufacturers)
  peer0-org1:
    image: hyperledger/fabric-peer:latest
    container_name: ayurtrace-peer0-org1
    restart: unless-stopped
    ports:
      - "7051:7051"
    environment:
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: ayurtrace-network
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_TLS_ENABLED: false
      CORE_PEER_GOSSIP_USELEADERELECTION: true
      CORE_PEER_GOSSIP_ORGLEADER: false
      CORE_PEER_PROFILE_ENABLED: true
      CORE_PEER_TLS_CERT_FILE: /etc/hyperledger/fabric/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /etc/hyperledger/fabric/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /etc/hyperledger/fabric/tls/ca.crt
      CORE_PEER_ID: peer0.org1.ayurtrace.com
      CORE_PEER_ADDRESS: peer0-org1:7051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:7051
      CORE_PEER_CHAINCODEADDRESS: peer0-org1:7052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:7052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer0-org1:7051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer0-org1:7051
      CORE_PEER_LOCALMSPID: Org1MSP
    volumes:
      - /var/run/:/host/var/run/
      - ./blockchain/network/peer0-org1:/etc/hyperledger/fabric/msp
      - ./blockchain/network/peer0-org1/tls:/etc/hyperledger/fabric/tls
      - peer0_org1_data:/var/hyperledger/production
    depends_on:
      - fabric-ca-org1
      - orderer
    networks:
      - ayurtrace-network

  # Orderer Service
  orderer:
    image: hyperledger/fabric-orderer:latest
    container_name: ayurtrace-orderer
    restart: unless-stopped
    ports:
      - "7050:7050"
    environment:
      FABRIC_LOGGING_SPEC: INFO
      ORDERER_GENERAL_LISTENADDRESS: 0.0.0.0
      ORDERER_GENERAL_LISTENPORT: 7050
      ORDERER_GENERAL_GENESISMETHOD: file
      ORDERER_GENERAL_GENESISFILE: /var/hyperledger/orderer/orderer.genesis.block
      ORDERER_GENERAL_LOCALMSPID: OrdererMSP
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
      ORDERER_GENERAL_TLS_ENABLED: false
    volumes:
      - ./blockchain/network/orderer/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./blockchain/network/orderer/msp:/var/hyperledger/orderer/msp
      - orderer_data:/var/hyperledger/production/orderer
    networks:
      - ayurtrace-network

  # Blockchain Explorer (Optional - for viewing blockchain data)
  blockchain-explorer:
    image: hyperledger/explorer:latest
    container_name: ayurtrace-explorer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_HOST: explorer-db
      DATABASE_DATABASE: fabricexplorer
      DATABASE_USERNAME: hppoc
      DATABASE_PASSWD: password
    volumes:
      - ./blockchain/explorer/config.json:/opt/explorer/app/platform/fabric/config.json
      - ./blockchain/explorer/connection-profile:/opt/explorer/app/platform/fabric/connection-profile
      - ./blockchain/network:/tmp/crypto
    depends_on:
      - explorer-db
      - peer0-org1
    networks:
      - ayurtrace-network

  # PostgreSQL Database for Blockchain Explorer
  explorer-db:
    image: hyperledger/explorer-db:latest
    container_name: ayurtrace-explorer-db
    restart: unless-stopped
    environment:
      DATABASE_DATABASE: fabricexplorer
      DATABASE_USERNAME: hppoc
      DATABASE_PASSWORD: password
    volumes:
      - explorer_db_data:/var/lib/postgresql/data
    networks:
      - ayurtrace-network

  # Redis for Caching (Optional)
  redis:
    image: redis:7-alpine
    container_name: ayurtrace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ayurtrace-network
    command: redis-server --appendonly yes

  # Nginx Load Balancer/Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ayurtrace-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ayurtrace-network

  # QR Code Service (Microservice for QR generation)
  qr-service:
    build:
      context: ./services/qr-service
      dockerfile: Dockerfile
    container_name: ayurtrace-qr-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
    networks:
      - ayurtrace-network

  # GPS Location Service (Microservice for location services)
  location-service:
    build:
      context: ./services/location-service
      dockerfile: Dockerfile
    container_name: ayurtrace-location-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      GPS_API_KEY: ${GPS_API_KEY}
    networks:
      - ayurtrace-network

  # Analytics Service (For processing analytics data)
  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: ayurtrace-analytics-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password@mongodb:27017/ayurtrace?authSource=admin
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - ayurtrace-network

  # Monitoring and Logging
  
  # Prometheus for Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: ayurtrace-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - ayurtrace-network

  # Grafana for Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: ayurtrace-grafana
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - ayurtrace-network

volumes:
  mongodb_data:
  peer0_org1_data:
  orderer_data:
  explorer_db_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  ayurtrace-network:
    driver: bridge
